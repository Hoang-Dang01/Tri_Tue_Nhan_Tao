<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phát Hiện URL Độc Hại - LightGBM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-shield-alt"></i> Phát Hiện URL Độc Hại</h1>
            <p class="subtitle">Kiểm tra URL có phải phishing hay không bằng LightGBM</p>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="card input-section">
                <h2>📝 Nhập URL để kiểm tra</h2>
                <form id="analyzeForm">
                    <div class="input-group">
                        <input type="text" id="urlInput" 
                               placeholder="Ví dụ: https://example.com" 
                               required 
                               autocomplete="off">
                        <button type="submit" id="analyzeBtn" class="btn-primary">
                            <span class="btn-text">Phân Tích</span>
                            <span class="btn-loader hidden">
                                <i class="fas fa-spinner fa-spin"></i>
                            </span>
                        </button>
                    </div>
                </form>
                <div class="helper-text">
                    💡 Ví dụ test: 
                    <a href="javascript:void(0)" class="example-link" data-url="https://www.google.com">Google</a> | 
                    <a href="javascript:void(0)" class="example-link" data-url="http://allegrolokalnie.pl-oferta73901248.cfd">Phishing</a>
                </div>
            </section>

            <!-- Results Section (Hidden by default) -->
            <section class="card results-section hidden" id="resultsSection">
                <div class="result-verdict" id="resultVerdict">
                    <!-- Verdict will be rendered here -->
                </div>

                <!-- Features Table -->
                <div class="features-area">
                    <h3>📊 Chi tiết phân tích</h3>
                    <table id="featuresTable">
                        <thead>
                            <tr>
                                <th>Đặc trưng</th>
                                <th>Giá trị</th>
                                <th>Ghi chú</th>
                            </tr>
                        </thead>
                        <tbody id="featuresBody">
                            <!-- Rows will be added here -->
                        </tbody>
                    </table>
                </div>

                <!-- Clear Button -->
                <button type="button" class="btn-secondary" id="clearBtn">
                    ↻ Kiểm tra URL mới
                </button>
            </section>

            <!-- Error Message -->
            <section class="card error-section hidden" id="errorSection">
                <div class="error-content">
                    <i class="fas fa-exclamation-circle"></i>
                    <p id="errorMessage"></p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>🤖 LightGBM Malicious URL Detector | v1.0</p>
        </footer>
    </div>

    <script src="/static/script.js?v=2"></script>
</body>
</html>
